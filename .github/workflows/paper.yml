name: Paper trading (BTC)

# Monitors BTC every ~5 min: scans the shared engine, Claude-verifies new setups,
# pings Telegram, fills paper trades on the entry tap, manages them (TP1-then-trail)
# and posts a weekly review. State lives on the isolated `paper-data` branch so it
# survives between runs without touching main / Pages.
on:
  # Reliable trigger: an external cron (cron-job.org) POSTs repository_dispatch
  # every ~5 min — GitHub's own `schedule` is throttled and unreliable, so it's
  # kept only as a backup. event_type = monitor | review.
  repository_dispatch:
    types: [monitor, review]
  schedule:
    - cron: '*/5 * * * *'   # backup monitor (GitHub may skip these)
    - cron: '0 12 * * 0'    # backup weekly review — Sunday 12:00 UTC (5:30 PM IST)
  workflow_dispatch:
    inputs:
      task:
        description: 'monitor or review'
        default: 'monitor'

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Load state from paper-data branch
        run: |
          git clone --depth 1 --branch paper-data --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/pd 2>/dev/null || mkdir -p /tmp/pd
          # Two independent books: state.json (Claude-gated) + state-algo.json (auto, no Claude)
          for f in state.json state-algo.json; do
            if [ -f /tmp/pd/$f ]; then cp /tmp/pd/$f ./$f; echo "loaded $f";
            else echo '{"pending":[],"open":[],"closed":[],"startEquity":1000}' > ./$f; echo "initialised $f"; fi
          done
          # Live on/off + quantity, set by the portal (default OFF if the file is absent)
          if [ -f /tmp/pd/live-config.json ]; then cp /tmp/pd/live-config.json ./live-config.json; echo "loaded live-config";
          else echo '{"armed":false,"lots":1}' > ./live-config.json; echo "no live-config — OFF"; fi

      - name: Run paper-trader
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          STATE_FILE: ${{ github.workspace }}/state.json
          ALGO_STATE_FILE: ${{ github.workspace }}/state-algo.json
          # Live execution (algo book) — DORMANT until BOTH the trade keys (secrets) are set
          # AND the portal switch in live-config.json says armed:true. Default: nothing live.
          LIVE_CONFIG_FILE: ${{ github.workspace }}/live-config.json
          DELTA_API_KEY: ${{ secrets.DELTA_API_KEY }}
          DELTA_API_SECRET: ${{ secrets.DELTA_API_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TASK="${{ github.event.action }}"                # monitor | review
          elif [ -n "${{ github.event.inputs.task }}" ]; then
            TASK="${{ github.event.inputs.task }}"
          elif [ "${{ github.event.schedule }}" = "0 12 * * 0" ]; then
            TASK="review"
          else
            TASK="monitor"
          fi
          [ -z "$TASK" ] && TASK="monitor"
          echo "task=$TASK (event=${{ github.event_name }})"
          node .github/scripts/paper-trade.js "$TASK"

      - name: Persist state to paper-data branch
        run: |
          rm -rf /tmp/pd
          if ! git clone --depth 1 --branch paper-data --single-branch \
                 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/pd 2>/dev/null; then
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/pd
            cd /tmp/pd && git checkout --orphan paper-data && git rm -rf . >/dev/null 2>&1 || true
            cd "$GITHUB_WORKSPACE"
          fi
          cp ./state.json /tmp/pd/state.json
          cp ./state-algo.json /tmp/pd/state-algo.json
          cd /tmp/pd
          git config user.name "jarvis-bot"
          git config user.email "jarvis-bot@users.noreply.github.com"
          git add state.json state-algo.json
          git commit -m "paper state $(date -u +%FT%TZ) [skip ci]" || { echo "no change"; exit 0; }
          # Retry with rebase: a failed push leaves stale state → duplicate pings next
          # run, and backtest.yml writes the same branch, so a non-fast-forward is possible.
          for i in 1 2 3; do
            git push origin paper-data && { echo "pushed"; break; }
            echo "push failed (attempt $i) — re-syncing"; git pull --rebase origin paper-data || true; sleep 3
            [ "$i" = 3 ] && { echo "push failed after retries"; exit 1; }
          done
