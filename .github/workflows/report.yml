name: JARVIS Scheduled Report

on:
  schedule:
    - cron: '30 3 * * *'    # 9:00 AM IST  (Asia mid-session)
    - cron: '30 8 * * *'    # 2:00 PM IST  (30 min before London)
    - cron: '30 13 * * *'   # 6:00 PM IST  (30 min before New York)
  workflow_dispatch:

jobs:
  swing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Swing Report
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          REPORT_MODE: swing
          REPORT_SYMS: BTCUSD,SOLUSD,ETHUSD
        run: node .github/scripts/report.js
